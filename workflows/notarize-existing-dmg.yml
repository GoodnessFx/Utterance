name: Notarize Existing macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag, example: v1.4.0"
        required: true
        default: "v1.4.0"
      dmg_name:
        description: "Exact DMG asset name already uploaded to the release"
        required: true
        default: "AnchorCastUpdate_v1.4.0_arm64.dmg"

permissions:
  contents: write

jobs:
  notarize-existing-dmg:
    name: Notarize and replace release DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          test -n "${{ secrets.APPLE_ID }}" || (echo "Missing APPLE_ID secret" && exit 1)
          test -n "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" || (echo "Missing APPLE_APP_SPECIFIC_PASSWORD secret" && exit 1)
          test -n "${{ secrets.APPLE_TEAM_ID }}" || (echo "Missing APPLE_TEAM_ID secret" && exit 1)

      - name: Download DMG from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          DMG_NAME: ${{ inputs.dmg_name }}
        shell: bash
        run: |
          mkdir -p notarize-work
          cd notarize-work
          echo "Downloading $DMG_NAME from release $RELEASE_TAG"
          gh release download "$RELEASE_TAG" --pattern "$DMG_NAME" --clobber
          ls -lh
          test -f "$DMG_NAME" || (echo "DMG was not downloaded: $DMG_NAME" && exit 1)

      - name: Store Apple notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          xcrun notarytool store-credentials "AnchorCastNotaryCI" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --no-validate

      - name: Submit DMG for notarization
        env:
          DMG_NAME: ${{ inputs.dmg_name }}
        shell: bash
        run: |
          cd notarize-work
          xcrun notarytool submit "$DMG_NAME" \
            --keychain-profile "AnchorCastNotaryCI" \
            --wait \
            --timeout 60m

      - name: Staple notarization ticket to DMG
        env:
          DMG_NAME: ${{ inputs.dmg_name }}
        shell: bash
        run: |
          cd notarize-work
          xcrun stapler staple "$DMG_NAME"
          xcrun stapler validate "$DMG_NAME"

      - name: Verify notarized DMG with Gatekeeper
        env:
          DMG_NAME: ${{ inputs.dmg_name }}
        shell: bash
        run: |
          cd notarize-work
          spctl -a -vvv --type install "$DMG_NAME"

      - name: Replace release asset with same filename
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          DMG_NAME: ${{ inputs.dmg_name }}
        shell: bash
        run: |
          cd notarize-work
          gh release upload "$RELEASE_TAG" "$DMG_NAME" --clobber
